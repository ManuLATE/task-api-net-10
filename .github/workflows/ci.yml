name: CI - Build

on:
  fork

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: ubunto-latest

    steps:
      - name: Mensaje inicial
        run: echo "Iniciando workflow de CI"

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}
      
      - name: Verificar versión .NET
        run: dotnet --version

      - name: Build del proyecto
        id: build-step
        # working-directory: 'src/Api'
        run: dotnet build src/Api/Api.csproj --configuration ${{env.BUILD_CONFIGURATION}}
        continue-on-error: true

      - name: Notifica on Build Failure
        if: steps.build-step.outcome == 'failure'
        run: echo "😭La compilación falló😡"
        
      - name: Mensaje final
        run: echo "Workflow completado exitosamente"
