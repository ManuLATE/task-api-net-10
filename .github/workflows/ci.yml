name: CI - Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubunto-latest

    steps:
      - name: Mensaje inicial
        run: echo "Iniciando workflow de CI"

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Verificar versión .NET
        run: dotnet --version
